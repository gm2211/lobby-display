name: E2E Regression (Staging)

on:
  workflow_run:
    workflows: ["Auto Tag & Deploy Staging"]
    types: [completed]
  schedule:
    - cron: '0 6 * * *'  # Nightly at 6am UTC
  workflow_dispatch:

jobs:
  e2e:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for staging deploy
        run: |
          echo "Waiting for staging to be ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$E2E_BASE_URL/api/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging is ready!"
              exit 0
            fi
            echo "Attempt $i/30 - status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Staging did not become ready in time"
          exit 1
        env:
          E2E_BASE_URL: https://seven7-hudson-staging.onrender.com

      - name: Run E2E tests
        run: npx playwright test --config=e2e/playwright.config.ts
        env:
          CI: true
          E2E_BASE_URL: https://seven7-hudson-staging.onrender.com
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          E2E_EDITOR_USER: ${{ secrets.E2E_EDITOR_USER }}
          E2E_EDITOR_PASS: ${{ secrets.E2E_EDITOR_PASS }}
          E2E_VIEWER_USER: ${{ secrets.E2E_VIEWER_USER }}
          E2E_VIEWER_PASS: ${{ secrets.E2E_VIEWER_PASS }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            e2e/playwright-report/
            e2e/test-results/
            e2e/test-results.json
          retention-days: 14
