name: Auto-tag & advance staging

on:
  push:
    branches: [main]

concurrency:
  group: auto-tag
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag-and-deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-deploy]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag and bump patch
        id: tag
        run: |
          LATEST=$(git tag -l 'v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v1.0.1"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Bumping $LATEST -> $NEW_TAG"

      - name: Create and push tag
        run: |
          git tag "${{ steps.tag.outputs.new_tag }}" "${{ github.sha }}"
          git push origin "${{ steps.tag.outputs.new_tag }}"

      - name: Advance deploy/staging
        run: |
          git push origin "${{ github.sha }}:refs/heads/deploy/staging" --force
