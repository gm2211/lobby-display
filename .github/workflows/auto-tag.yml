name: Auto Tag & Deploy Staging

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Determine next version tag
        id: tag
        run: |
          # Find the latest v* tag (semver patch bump)
          LATEST=$(git tag --sort=-v:refname --list 'v*' | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            # Parse major.minor.patch and bump patch
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping ${LATEST:-<none>} → $NEXT"

      - name: Create tag
        run: |
          git tag "${{ steps.tag.outputs.next }}" "${{ github.sha }}"
          git push origin "${{ steps.tag.outputs.next }}"

      - name: Advance deploy/staging
        run: |
          git push origin ${{ github.sha }}:refs/heads/deploy/staging --force
