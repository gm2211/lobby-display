<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Building Updates</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: linear-gradient(160deg, #e8f5f5 0%, #f5f7fa 60%, #fff 100%);
  }
  .form-card {
    display: flex; flex-direction: column; gap: 16px;
    width: 100%; max-width: 360px;
    padding: 36px 32px;
    background: #fff; border-radius: 12px;
    border: 1px solid #b2dfdb;
    box-shadow: 0 4px 24px rgba(26,92,90,0.08);
    color: #333;
  }
  .logo { text-align: center; margin-bottom: 4px; }
  .logo span {
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: #1a5c5a; opacity: 0.7;
  }
  h1 { margin: 0; color: #1a5c5a; font-size: 22px; font-weight: 700; text-align: center; }
  .subtitle { color: #666; font-size: 13px; text-align: center; }
  label {
    display: flex; flex-direction: column; gap: 4px;
    color: #555; font-size: 13px; font-weight: 600;
  }
  input {
    padding: 10px 12px; background: #fff;
    border: 1px solid #ccc; border-radius: 6px;
    color: #333; font-size: 14px; outline: none; font-weight: 400;
  }
  input:focus { border-color: #1a5c5a; }
  button {
    padding: 11px; background: #1a5c5a;
    border: none; border-radius: 6px;
    color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 8px; letter-spacing: 0.3px;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .error {
    padding: 10px; background: #fff5f5;
    border: 1px solid #ffcdd2; border-radius: 6px;
    color: #c62828; font-size: 13px; text-align: center;
    display: none;
  }
  .hidden { display: none; }
</style>
</head>
<body>
  <!-- Login form -->
  <form id="login-form" class="form-card hidden" autocomplete="on">
    <div class="logo"><span>Building Updates</span></div>
    <h1>Sign In</h1>
    <div id="login-error" class="error"></div>
    <label>Username
      <input id="login-user" type="text" required autocomplete="username" autofocus>
    </label>
    <label>Password
      <input id="login-pass" type="password" required autocomplete="current-password">
    </label>
    <button type="submit">Sign In</button>
  </form>

  <!-- Setup form (first-time) -->
  <form id="setup-form" class="form-card hidden" autocomplete="on">
    <div class="logo"><span>Building Updates</span></div>
    <h1>Create Admin Account</h1>
    <p class="subtitle">Set up your first admin account to get started.</p>
    <div id="setup-error" class="error"></div>
    <label>Username
      <input id="setup-user" type="text" required autocomplete="username" autofocus>
    </label>
    <label>Password
      <input id="setup-pass" type="password" required minlength="8" autocomplete="new-password">
    </label>
    <label>Confirm Password
      <input id="setup-confirm" type="password" required autocomplete="new-password">
    </label>
    <button type="submit">Create Account</button>
  </form>

  <!-- Loading state -->
  <div id="loading" class="form-card"><div style="text-align:center">Loading...</div></div>

<script>
(function() {
  var loading = document.getElementById('loading');
  var loginForm = document.getElementById('login-form');
  var setupForm = document.getElementById('setup-form');

  function showError(id, msg) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError(id) {
    document.getElementById(id).style.display = 'none';
  }

  // Check if already logged in
  fetch('/api/auth/me', { credentials: 'same-origin' })
    .then(function(r) { return r.json(); })
    .then(function(user) {
      if (user) {
        window.location.replace('/');
        return;
      }
      return init();
    })
    .catch(function() { init(); });

  function init() {
    fetch('/api/auth/setup-required')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        loading.classList.add('hidden');
        if (data.required) {
          setupForm.classList.remove('hidden');
        } else {
          loginForm.classList.remove('hidden');
        }
      })
      .catch(function() {
        loading.classList.add('hidden');
        loginForm.classList.remove('hidden');
      });
  }

  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();
    hideError('login-error');
    var btn = loginForm.querySelector('button');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        username: document.getElementById('login-user').value,
        password: document.getElementById('login-pass').value
      })
    })
    .then(function(r) {
      if (!r.ok) return r.json().then(function(d) { throw new Error(d.message || d.error || 'Login failed'); });
      window.location.replace('/');
    })
    .catch(function(err) {
      showError('login-error', err.message);
      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
  });

  setupForm.addEventListener('submit', function(e) {
    e.preventDefault();
    hideError('setup-error');
    var pass = document.getElementById('setup-pass').value;
    var confirm = document.getElementById('setup-confirm').value;
    if (pass !== confirm) { showError('setup-error', 'Passwords do not match'); return; }
    if (pass.length < 8) { showError('setup-error', 'Password must be at least 8 characters'); return; }

    var btn = setupForm.querySelector('button');
    btn.disabled = true;
    btn.textContent = 'Creating...';

    fetch('/api/auth/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        username: document.getElementById('setup-user').value,
        password: pass
      })
    })
    .then(function(r) {
      if (!r.ok) return r.json().then(function(d) { throw new Error(d.message || d.error || 'Setup failed'); });
      window.location.replace('/');
    })
    .catch(function(err) {
      showError('setup-error', err.message);
      btn.disabled = false;
      btn.textContent = 'Create Account';
    });
  });
})();
</script>
</body>
</html>
