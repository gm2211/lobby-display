databases:
  - name: hudson-dashboard-db
    plan: basic-256mb
    databaseName: lobby

  - name: hudson-dashboard-staging-db
    plan: free
    databaseName: lobby_staging

services:
  # ── Production ──────────────────────────────────────────
  - type: web
    name: 77-hudson-dashboard
    runtime: node
    plan: starter
    branch: deploy/prod
    buildCommand: bash scripts/render-build.sh
    startCommand: bash scripts/render-start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hudson-dashboard-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECRET
        generateValue: true

  # ── Staging ─────────────────────────────────────────────
  - type: web
    name: 77-hudson-staging
    runtime: docker
    plan: free
    branch: deploy/staging
    dockerfilePath: ./Dockerfile.staging
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hudson-dashboard-staging-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECRET
        generateValue: true
      - key: CC_EMAIL
        sync: false
      - key: CC_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
