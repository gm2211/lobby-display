name: E2E Regression (Staging)

on:
  workflow_run:
    workflows: ["Auto-tag & advance staging"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: false
        default: 'https://seven7-hudson-staging.onrender.com'

  schedule:
    - cron: '0 6 * * *'   # Daily 6 AM UTC — catch staging drift

concurrency:
  group: e2e-staging
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for staging to be ready
        env:
          E2E_BASE_URL: ${{ inputs.base_url || 'https://seven7-hudson-staging.onrender.com' }}
        run: |
          echo "Polling $E2E_BASE_URL/api/health ..."
          TIMEOUT=300
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$E2E_BASE_URL/api/health" 2>/dev/null || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging is ready (took ${ELAPSED}s)"
              exit 0
            fi
            echo "  ... not ready (HTTP $STATUS), retrying in 10s"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          echo "ERROR: Staging did not become ready within ${TIMEOUT}s"
          exit 1

      - name: Run E2E tests
        env:
          E2E_BASE_URL: ${{ inputs.base_url || 'https://seven7-hudson-staging.onrender.com' }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          E2E_EDITOR_USER: ${{ secrets.E2E_EDITOR_USER }}
          E2E_EDITOR_PASS: ${{ secrets.E2E_EDITOR_PASS }}
          E2E_VIEWER_USER: ${{ secrets.E2E_VIEWER_USER }}
          E2E_VIEWER_PASS: ${{ secrets.E2E_VIEWER_PASS }}
        run: npx playwright test --config=e2e/playwright.config.ts

      - name: Write job summary
        if: always()
        run: |
          echo "## E2E Regression Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f e2e/test-results.json ]; then
            PASSED=$(jq '[.suites[].specs[].tests[] | select(.status == "expected")] | length' e2e/test-results.json 2>/dev/null || echo "?")
            FAILED=$(jq '[.suites[].specs[].tests[] | select(.status == "unexpected")] | length' e2e/test-results.json 2>/dev/null || echo "?")
            SKIPPED=$(jq '[.suites[].specs[].tests[] | select(.status == "skipped")] | length' e2e/test-results.json 2>/dev/null || echo "?")
            echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          else
            echo "> No test results JSON found." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the **playwright-report** artifact for the full HTML report." >> $GITHUB_STEP_SUMMARY

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/
          retention-days: 7
